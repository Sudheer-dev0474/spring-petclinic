name: ICARE-CICD-PRO

on:
  push:
    branches:
      - main
  
jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: build project
        run: mvn clean package

      - name: build image
        run: docker image build -t myrepo/app:latest .

      